<body>

<header class="bar"><div class="wrap">
  <span class="logo"><img class="emblem emblem-nav" src="assets/logo.svg" alt="" aria-hidden="true" /><span class="wm" data-brand></span></span>
  <nav id="nav"></nav>
</div></header>

<main>
  <!-- HERO -->
  <section class="hero"><div class="wrap">
    <p class="eyebrow" id="hero-eyebrow"></p>
    <h1 id="hero-headline"></h1>
    <p class="lead" id="hero-lead"></p>
    <div class="facts" id="pills"></div>
    <div class="creed">
      <img class="emblem emblem-creed" src="assets/logo.svg" alt="" aria-hidden="true" />
      <p id="creed-text"></p>
    </div>
  </div></section>

  <div class="wrap"><div class="divider"><span class="orb"></span></div></div>

  <!-- TWO ARMS -->
  <section id="invest"><div class="wrap">
    <h2 id="arms-title"></h2>
    <p class="sub" id="arms-sub"></p>
    <div class="arms" id="arms"></div>
  </div></section>

  <div class="wrap"><div class="divider"><span class="orb"></span></div></div>

  <!-- THESIS -->
  <section id="thesis"><div class="wrap">
    <h2 id="thesis-title"></h2>
    <p class="sub" id="thesis-sub"></p>
    <div class="grid3" id="tiles"></div>
  </div></section>

  <div class="wrap"><div class="divider"><span class="orb"></span></div></div>

  <!-- PORTFOLIO -->
  <section id="portfolio"><div class="wrap">
    <h2 id="portfolio-title"></h2>
    <p class="sub" id="portfolio-sub"></p>
    <div id="portfolio-groups"></div>
  </div></section>

  <div class="wrap"><div class="divider"><span class="orb"></span></div></div>

  <!-- TEAM -->
  <section id="team"><div class="wrap">
    <h2 id="team-title"></h2>
    <p class="sub" id="team-sub"></p>
    <div class="people" id="people"></div>
  </div></section>
</main>

<!-- CONTACT -->
<section id="contact" class="contact"><div class="inner"><div class="wrap" style="text-align:center;">
  <p class="eyebrow" id="contact-eyebrow"></p>
  <h2 id="contact-title"></h2>
  <p class="sub" id="contact-sub"></p>
  <a class="cta" id="contact-cta" href="#"></a>
</div></div></section>

<footer><div class="wrap">
  <span class="logo"><img class="emblem emblem-nav" src="assets/logo.svg" alt="" aria-hidden="true" /><span class="wm" data-brand></span></span>
  <span class="muted"><span id="footer-tagline"></span> · <a id="footer-email" href="#"></a></span>
</div></footer>

<script src="content/content.js"></script>
<script src="js/app.js"></script>
