<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Kamadhenu Capital — Logo Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbf7ef; --bg2:#f5edde; --card:#fffdf8;
    --ink:#1f1b14; --soft:#6b6354; --line:#e8dcc6;
    --gold:#c2871d; --gold-dk:#a06e12; --maroon:#7c2433; --green:#2f6b4d;
    --r:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:48px 20px 64px;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:30px;
    letter-spacing:-.01em;margin:0 0 6px;}
  .eyebrow{font-size:12.5px;font-weight:600;letter-spacing:.2em;
    text-transform:uppercase;color:var(--gold-dk);margin:0 0 14px;}
  .sub{color:var(--soft);font-size:15px;margin:0 0 36px;text-align:center;max-width:46ch;}

  .stage{position:relative;width:min(640px,100%);}
  .frame{position:relative;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);overflow:hidden;
    box-shadow:0 14px 40px -22px rgba(31,27,20,.45);}
  .track{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);}
  .slide{min-width:100%;display:flex;align-items:center;justify-content:center;
    aspect-ratio:1/1;background:var(--card);}
  .slide img{width:100%;height:100%;object-fit:contain;display:block;}

  .arrow{position:absolute;top:50%;transform:translateY(-50%);
    width:46px;height:46px;border-radius:50%;border:1px solid var(--line);
    background:rgba(255,253,248,.92);backdrop-filter:blur(6px);
    color:var(--ink);font-size:20px;cursor:pointer;display:grid;place-items:center;
    box-shadow:0 6px 18px -10px rgba(31,27,20,.5);transition:.18s;z-index:2;}
  .arrow:hover{color:var(--maroon);border-color:var(--gold);}
  .arrow.prev{left:-23px;} .arrow.next{right:-23px;}
  @media(max-width:560px){.arrow.prev{left:8px;} .arrow.next{right:8px;}}

  .meta{display:flex;align-items:center;justify-content:space-between;gap:16px;
    margin-top:18px;width:min(640px,100%);}
  .counter{font-size:13px;color:var(--soft);font-variant-numeric:tabular-nums;}
  .counter b{color:var(--ink);font-weight:600;}
  .name{font-size:13px;color:var(--soft);font-family:ui-monospace,Menlo,monospace;}

  .dots{display:flex;gap:10px;justify-content:center;margin-top:22px;}
  .dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--gold);
    background:transparent;cursor:pointer;padding:0;transition:.18s;}
  .dot[aria-current="true"]{background:var(--gold);transform:scale(1.15);}

  .thumbs{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center;}
  .thumb{width:84px;height:84px;border-radius:12px;overflow:hidden;
    border:2px solid var(--line);background:var(--card);cursor:pointer;padding:0;transition:.18s;}
  .thumb img{width:100%;height:100%;object-fit:contain;}
  .thumb[aria-current="true"]{border-color:var(--gold);
    box-shadow:0 6px 16px -8px rgba(194,135,29,.7);}
  .hint{margin-top:34px;font-size:13px;color:var(--soft);}
  .hint kbd{font-family:ui-monospace,monospace;background:var(--bg2);
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;}
</style>
</head>
<body>
  <p class="eyebrow">Kamadhenu Capital</p>
  <h1>Logo candidates</h1>
  <p class="sub">Four marks to choose from. Use the arrows, dots, thumbnails, or arrow keys. The filename under each helps you tell me which one to lock in.</p>

  <div class="stage">
    <div class="frame">
      <div class="track" id="track">
        <div class="slide"><img src="../assets/logo-candidates/logo-1.jpeg" alt="Logo candidate 1" /></div>
        <div class="slide"><img src="../assets/logo-candidates/logo-2.jpeg" alt="Logo candidate 2" /></div>
        <div class="slide"><img src="../assets/logo-candidates/logo-3.jpeg" alt="Logo candidate 3" /></div>
        <div class="slide"><img src="../assets/logo-candidates/logo-4.jpeg" alt="Logo candidate 4" /></div>
      </div>
    </div>
    <button class="arrow prev" id="prev" aria-label="Previous logo">&#8249;</button>
    <button class="arrow next" id="next" aria-label="Next logo">&#8250;</button>
  </div>

  <div class="meta">
    <span class="counter"><b id="cur">1</b> / 4</span>
    <span class="name" id="name">logo-1.jpeg</span>
  </div>

  <div class="dots" id="dots" role="tablist" aria-label="Choose logo"></div>

  <div class="thumbs" id="thumbs"></div>

  <p class="hint">Tip: <kbd>&larr;</kbd> <kbd>&rarr;</kbd> to flip through.</p>

<script>
  var files = ['logo-1.jpeg','logo-2.jpeg','logo-3.jpeg','logo-4.jpeg'];
  var n = files.length, i = 0;
  var track = document.getElementById('track');
  var dots = document.getElementById('dots');
  var thumbs = document.getElementById('thumbs');

  for (var k = 0; k < n; k++){
    var d = document.createElement('button');
    d.className = 'dot'; d.setAttribute('role','tab');
    d.setAttribute('aria-label','Logo ' + (k+1));
    (function(idx){ d.onclick = function(){ go(idx); }; })(k);
    dots.appendChild(d);

    var t = document.createElement('button');
    t.className = 'thumb';
    t.innerHTML = '<img src="../assets/logo-candidates/' + files[k] + '" alt="Logo ' + (k+1) + ' thumbnail" />';
    (function(idx){ t.onclick = function(){ go(idx); }; })(k);
    thumbs.appendChild(t);
  }

  function go(idx){
    i = (idx + n) % n;
    track.style.transform = 'translateX(' + (-i * 100) + '%)';
    document.getElementById('cur').textContent = i + 1;
    document.getElementById('name').textContent = files[i];
    var dd = dots.children, tt = thumbs.children;
    for (var k = 0; k < n; k++){
      dd[k].setAttribute('aria-current', k === i ? 'true' : 'false');
      tt[k].setAttribute('aria-current', k === i ? 'true' : 'false');
    }
  }

  document.getElementById('prev').onclick = function(){ go(i - 1); };
  document.getElementById('next').onclick = function(){ go(i + 1); };
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft') go(i - 1);
    if (e.key === 'ArrowRight') go(i + 1);
  });
  go(0);
</script>
</body>
</html>
