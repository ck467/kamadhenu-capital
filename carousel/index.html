<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kamadhenu — logo carousel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 *{box-sizing:border-box;margin:0}
 body{font-family:'Inter',sans-serif;transition:background .3s,color .3s;min-height:100vh;display:flex;flex-direction:column}
 body.light{background:#f4efe3;color:#241c12}
 body.dark{background:#160c10;color:#cdc1b0}
 header{text-align:center;padding:30px 20px 8px}
 header h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px}
 header p{font-size:13px;opacity:.7;margin-top:4px}
 .stage{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;padding:10px 20px}
 .arrow{flex:none;width:54px;height:54px;border-radius:50%;border:1px solid currentColor;background:none;color:inherit;font-size:22px;cursor:pointer;opacity:.5;transition:opacity .2s}
 .arrow:hover{opacity:1}
 .frame{flex:1;max-width:720px;height:58vh;display:flex;align-items:center;justify-content:center;position:relative}
 .frame img{max-width:100%;max-height:100%;object-fit:contain}
 body.dark.blend .frame img{mix-blend-mode:screen}
 .caption{text-align:center;padding:6px 20px 4px}
 .caption .name{font-family:'Cormorant Garamond',serif;font-size:24px}
 .caption .note{font-size:13px;opacity:.65;margin-top:2px}
 .counter{font-size:12px;letter-spacing:.2em;opacity:.55;margin-top:6px}
 .controls{display:flex;gap:14px;justify-content:center;align-items:center;padding:14px 20px 6px}
 .controls button{font-family:'Inter';font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;border:1px solid currentColor;background:none;color:inherit;border-radius:2px;cursor:pointer;opacity:.7}
 .controls button:hover{opacity:1}
 .dots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:10px 20px 34px}
 .dot{width:9px;height:9px;border-radius:50%;border:1px solid currentColor;background:none;cursor:pointer;opacity:.35;padding:0}
 .dot.on{opacity:1;background:currentColor}
</style></head>
<body class="dark blend">
 <header><h1>Kamadhenu Capital — choose a logo</h1><p>← → arrow keys to flip · click the background button to see it on light or dark</p></header>

 <div class="stage">
   <button class="arrow" id="prev" aria-label="previous">‹</button>
   <div class="frame"><img id="logo" alt=""></div>
   <button class="arrow" id="next" aria-label="next">›</button>
 </div>

 <div class="caption">
   <div class="name" id="name"></div>
   <div class="note" id="note"></div>
   <div class="counter" id="counter"></div>
 </div>

 <div class="controls">
   <button id="bg">Background: dark</button>
 </div>
 <div class="dots" id="dots"></div>

<script>
const A="../assets/", B="../assets/brand-logos/";
const SLIDES=[
 {src:B+"crest-light-leaves.jpeg", name:"Crest A — leaves",   note:"Ornate crest · fuller lotus + green leaves · AI raster (light)", bg:"light"},
 {src:B+"crest-light-horns.jpeg",  name:"Crest B — horns",    note:"Ornate crest · cow horns + lotus · AI raster (light)", bg:"light"},
 {src:B+"crest-light-a.jpeg",      name:"Crest C",            note:"Ornate crest · horns + small lotus · AI raster (light)", bg:"light"},
 {src:B+"crest-light-b.jpeg",      name:"Crest D",            note:"Ornate crest · variant of C · AI raster (light)", bg:"light"},
 {src:B+"crest-dark-silver.jpeg",  name:"Crest E — silver",   note:"Ornate crest · premium dark/silver · AI raster (dark)", bg:"dark"},
 {src:A+"logo.svg",                name:"Emblem — chalice + orb + lotus", note:"Line SVG · 3-colour · current site mark · sharp + recolorable", bg:"light"},
 {src:B+"emblem-coinheap.svg",     name:"Emblem — lotus + coin heap",     note:"Line SVG · latest iteration · chalice, lotus, gold-coin heap", bg:"light"},
 {src:A+"logo-cow.svg",            name:"Emblem — sacred cow",            note:"Line SVG · literal Kamadhenu cow", bg:"light"},
 {src:A+"logo-abstract.svg",       name:"Emblem — chalice (single gold)", note:"Line SVG · minimal", bg:"light"},
];
let i=0, override=null;
const body=document.body, img=document.getElementById('logo');
function bgFor(){ return override || SLIDES[i].bg; }
function render(){
 const s=SLIDES[i];
 img.src=s.src; img.alt=s.name;
 document.getElementById('name').textContent=s.name;
 document.getElementById('note').textContent=s.note;
 document.getElementById('counter').textContent=(i+1)+" / "+SLIDES.length;
 const bg=bgFor();
 body.classList.toggle('dark', bg==='dark');
 body.classList.toggle('light', bg==='light');
 document.getElementById('bg').textContent="Background: "+bg;
 [...document.querySelectorAll('.dot')].forEach((d,k)=>d.classList.toggle('on',k===i));
}
function go(n){ i=(n+SLIDES.length)%SLIDES.length; override=null; render(); }
document.getElementById('next').onclick=()=>go(i+1);
document.getElementById('prev').onclick=()=>go(i-1);
document.getElementById('bg').onclick=()=>{ override=(bgFor()==='dark')?'light':'dark'; render(); };
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(i+1); if(e.key==='ArrowLeft')go(i-1); });
const dots=document.getElementById('dots');
SLIDES.forEach((_,k)=>{const b=document.createElement('button');b.className='dot';b.onclick=()=>go(k);dots.appendChild(b);});
render();
</script>
</body></html>
